          { time: "14:20–18:00", room: "Lincoln West", track: "ICBO", title: "ICBO — VDOS Workshop: Vaccine and Drug Ontology Studies", type: "special", speakers: [],
            details: ["15th VDOS: AI and LLMs in ontology studies, adverse events, drug interactions, immune responses"] },
          { time: "11:00–13:00", room: "IBC", track: "MLCSB", title: "MLCSB — Late Morning Session", type: "cosi", speakers: [] },
          { time: "11:00–13:00", room: "IBE", track: "3DSIG", title: "3DSIG — Late Morning Session", type: "cosi", speakers: [] },
          { time: "11:00–13:00", room: "Room 9-10 Combo", track: "Bioinformatics in USA", title: "Bioinformatics in the USA — Late Morning", type: "special", speakers: [] },
          { time: "11:00–13:00", room: "Cabinet", track: "Education", title: "Education COSI — Late Morning", type: "cosi", speakers: [] },
          { time: "11:00–13:00", room: "Georgetown", track: "GenCompBio", title: "GenCompBio — Late Morning", type: "cosi", speakers: [] },
          { time: "11:00–13:00", room: "Jefferson West", track: "EvolCompGen", title: "EvolCompGen — Late Morning", type: "cosi", speakers: [] },
          { time: "11:00–13:00", room: "Jefferson East", track: "Pathogen Data Network", title: "Pathogen Data Network Forum", type: "special", speakers: [],
            details: ["Town-hall forum for infectious disease data researchers","Hosted by PDN, BV-BRC, BRC Analytics/Galaxy (NIH NIAID award U24AI183840)"] },
          { time: "11:00–13:00", room: "Lincoln West", track: "NVIDIA Workshop", title: "NVIDIA Workshop", type: "special", speakers: [] },
          { time: "11:00–13:00", room: "Lincoln East", track: "CAMDA", title: "CAMDA — Late Morning", type: "cosi", speakers: [] },
          { time: "14:20–16:00", room: "IBC", track: "MLCSB", title: "MLCSB — Afternoon Session", type: "cosi", speakers: [] },
          { time: "14:20–16:00", room: "IBE", track: "3DSIG", title: "3DSIG — Afternoon Session", type: "cosi", speakers: [] },
          { time: "14:20–16:00", room: "Room 9-10 Combo", track: "Bioinformatics in USA", title: "Bioinformatics in the USA — Afternoon", type: "special", speakers: [] },
          { time: "14:20–16:00", room: "Cabinet", track: "Education", title: "Education COSI — Afternoon", type: "cosi", speakers: [] },
          { time: "14:20–16:00", room: "Georgetown", track: "GenCompBio", title: "GenCompBio — Afternoon", type: "cosi", speakers: [] },
          { time: "14:20–16:00", room: "Jefferson West", track: "EvolCompGen", title: "EvolCompGen — Afternoon", type: "cosi", speakers: [] },
          { time: "14:20–16:00", room: "Lincoln East", track: "CAMDA", title: "CAMDA — Afternoon (Best Contributions Awards)", type: "cosi", speakers: [] },
          { time: "16:00–16:40", room: "Columbia", track: "Break", title: "Caffeinate and Connect with Posters & Exhibitors", type: "break", speakers: [] },
          { time: "16:40–18:00", room: "International Ballroom Center (IBC)", track: "Keynote", title: "Distinguished Keynote & Closing Ceremonies", type: "keynote",
            speakers: [{ name: "Marinka Zitnik", affiliation: "Harvard Medical School, USA", talk: "Foundations of Human-AI Co-Science", award: "ISCB 2026 Overton Prize" }] },
        ]
      },
    ];

    // ─── COLORS ──────────────────────────────────────────────────────────────────
    const TRACK_COLORS = {
      Keynote:{bg:"#1a1a2e",text:"#e0c46c",border:"#e0c46c"},HiTSeq:{bg:"#0d3b4a",text:"#5dd9c1",border:"#5dd9c1"},iRNA:{bg:"#2d1b4e",text:"#c084fc",border:"#c084fc"},RegSys:{bg:"#1a3a2e",text:"#4ade80",border:"#4ade80"},CompMS:{bg:"#3a1a1a",text:"#f87171",border:"#f87171"},MICROBIOME:{bg:"#1a2a3a",text:"#60a5fa",border:"#60a5fa"},"Text Mining":{bg:"#3a2a1a",text:"#fb923c",border:"#fb923c"},BOKR:{bg:"#1a1a3a",text:"#a78bfa",border:"#a78bfa"},BOSC:{bg:"#1a3a3a",text:"#34d399",border:"#34d399"},"BOKR/BOSC":{bg:"#2a1a3a",text:"#c084fc",border:"#c084fc"},"BOKR/Function":{bg:"#2a1a3a",text:"#a78bfa",border:"#a78bfa"},Function:{bg:"#3a1a3a",text:"#f472b6",border:"#f472b6"},CSI:{bg:"#1a3a1a",text:"#86efac",border:"#86efac"},MLCSB:{bg:"#2a2a1a",text:"#fde047",border:"#fde047"},TransMed:{bg:"#2a1a1a",text:"#fca5a5",border:"#fca5a5"},"3DSIG":{bg:"#1a2a2a",text:"#67e8f9",border:"#67e8f9"},NetBio:{bg:"#1a1a3a",text:"#818cf8",border:"#818cf8"},SysMod:{bg:"#2a3a1a",text:"#a3e635",border:"#a3e635"},BioVis:{bg:"#3a2a2a",text:"#fdba74",border:"#fdba74"},EvolCompGen:{bg:"#1a3a2a",text:"#6ee7b7",border:"#6ee7b7"},VarI:{bg:"#3a1a2a",text:"#f9a8d4",border:"#f9a8d4"},CAMDA:{bg:"#2a2a3a",text:"#93c5fd",border:"#93c5fd"},GenCompBio:{bg:"#2a3a2a",text:"#bbf7d0",border:"#bbf7d0"},DREAM:{bg:"#3a3a1a",text:"#fef08a",border:"#fef08a"},"BioInfo-Core":{bg:"#1a2a3a",text:"#7dd3fc",border:"#7dd3fc"},Education:{bg:"#2a2a2a",text:"#d4d4d4",border:"#d4d4d4"},Tutorials:{bg:"#1f2937",text:"#9ca3af",border:"#4b5563"},Break:{bg:"#111827",text:"#6b7280",border:"#374151"},Lunch:{bg:"#111827",text:"#6b7280",border:"#374151"},Social:{bg:"#1c1917",text:"#d6c394",border:"#92400e"},"Career Fair":{bg:"#1c1917",text:"#d6c394",border:"#92400e"},"Tech Talks":{bg:"#1a2a3a",text:"#7dd3fc",border:"#7dd3fc"},"NIH/ODSS":{bg:"#1a2a1a",text:"#86efac",border:"#86efac"},ICBO:{bg:"#2a1a2a",text:"#e879f9",border:"#e879f9"},WEB:{bg:"#1a3a1a",text:"#4ade80",border:"#4ade80"},SCS:{bg:"#1c1917",text:"#d6c394",border:"#92400e"},YBS:{bg:"#1c1917",text:"#fbbf24",border:"#fbbf24"},"Bioinformatics in USA":{bg:"#1a2a2a",text:"#67e8f9",border:"#67e8f9"},"NVIDIA Workshop":{bg:"#1a3a1a",text:"#76e85d",border:"#76e85d"},"Pathogen Data Network":{bg:"#3a1a1a",text:"#f87171",border:"#f87171"},"Equity & Diversity":{bg:"#2a1a3a",text:"#c084fc",border:"#c084fc"},QLS:{bg:"#1a1a2e",text:"#818cf8",border:"#818cf8"},"Career Symposium":{bg:"#1c1917",text:"#d6c394",border:"#92400e"},"Publishing Session":{bg:"#2a2a2a",text:"#d4d4d4",border:"#4b5563"},"Industry Workshop":{bg:"#2a1a1a",text:"#fca5a5",border:"#fca5a5"},
    };
    const getColor = (t) => TRACK_COLORS[t] || { bg:"#1a1a2e", text:"#94a3b8", border:"#334155" };
    const HIGHLIGHT_TRACKS = new Set(["HiTSeq","iRNA","BOKR","BOSC","BOKR/BOSC","BOKR/Function"]);

    // ─── APP ─────────────────────────────────────────────────────────────────────
    function App() {
      const [activeDay, setActiveDay] = useState("mon");
      const [selectedTracks, setSelectedTracks] = useState(new Set());
      const [showOnlyHighlight, setShowOnlyHighlight] = useState(false);
      const [searchQuery, setSearchQuery] = useState("");
      const [expandedSession, setExpandedSession] = useState(null);
      const [infoTrack, setInfoTrack] = useState(null);

      const currentDay = DAYS.find(d => d.id === activeDay);

      const filteredSessions = useMemo(() => {
        if (!currentDay) return [];
        return currentDay.sessions.filter(s => {
          if (showOnlyHighlight && !HIGHLIGHT_TRACKS.has(s.track)) return false;
          if (selectedTracks.size > 0 && !selectedTracks.has(s.track)) return false;
          if (searchQuery) {
            const q = searchQuery.toLowerCase();
            const meta = TRACK_META[s.track];
            if (![s.title, s.track, s.room, ...(s.speakers||[]).map(sp=>sp.name+" "+(sp.talk||"")), meta?.desc||"", ...(meta?.keywords||[])].some(t => t.toLowerCase().includes(q))) return false;
          }
          return true;
        });
      }, [currentDay, selectedTracks, showOnlyHighlight, searchQuery]);

      const toggleTrack = t => setSelectedTracks(prev => { const n = new Set(prev); n.has(t)?n.delete(t):n.add(t); return n; });

      return (
        <div style={{background:"#0a0f1e",minHeight:"100vh",color:"#e2e8f0",fontFamily:"'Inter','Segoe UI',sans-serif"}}>
          {/* Header */}
          <div style={{background:"linear-gradient(135deg,#0f172a 0%,#1e1b4b 50%,#0f172a 100%)",borderBottom:"1px solid #1e3a5f",padding:"24px 20px 16px"}}>
            <div style={{maxWidth:1200,margin:"0 auto"}}>
              <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:4}}>
                <div style={{width:8,height:8,borderRadius:"50%",background:"#38bdf8",boxShadow:"0 0 8px #38bdf8"}}/>
                <span style={{fontSize:11,letterSpacing:3,color:"#64748b",textTransform:"uppercase",fontWeight:600}}>34th Annual Conference</span>
              </div>
              <h1 style={{margin:0,fontSize:"clamp(24px,5vw,40px)",fontWeight:800,letterSpacing:"-0.5px",color:"#f8fafc"}}>ISMB <span style={{color:"#38bdf8"}}>2026</span></h1>
              <p style={{margin:"6px 0 0",color:"#64748b",fontSize:14}}>Washington Hilton, Washington DC · July 12–16 · Hybrid In-Person & Virtual</p>
              <div style={{marginTop:12,display:"flex",flexWrap:"wrap",gap:6}}>
                {["HiTSeq","iRNA","BOKR","BOSC","MLCSB","3DSIG","RegSys","ICBO","CAMDA"].map(t=>{const c=getColor(t);return<span key={t} style={{fontSize:11,padding:"2px 8px",borderRadius:4,border:`1px solid ${c.border}`,color:c.text,background:c.bg,fontWeight:600}}>{t}</span>;})}
                <span style={{fontSize:11,padding:"2px 8px",borderRadius:4,border:"1px solid #334155",color:"#64748b",background:"#0f172a"}}>+ 14 more</span>
              </div>
            </div>
          </div>

          {/* Day tabs */}
          <div style={{background:"#0d1117",borderBottom:"1px solid #1e2d3d",overflowX:"auto"}}>
            <div style={{maxWidth:1200,margin:"0 auto",display:"flex"}}>
              {DAYS.map(d=>(
                <button key={d.id} onClick={()=>{setActiveDay(d.id);setExpandedSession(null);}}
                  style={{padding:"14px 20px",background:activeDay===d.id?"#1e3a5f":"transparent",border:"none",borderBottom:activeDay===d.id?"2px solid #38bdf8":"2px solid transparent",color:activeDay===d.id?"#38bdf8":"#64748b",cursor:"pointer",fontSize:14,fontWeight:activeDay===d.id?700:400,whiteSpace:"nowrap"}}>
                  <div style={{fontSize:11,opacity:0.7,marginBottom:2}}>{d.label}</div>
                  <div>Jul {d.date.split(" ")[1]}</div>
                </button>
              ))}
            </div>
          </div>

          {/* Controls */}
          <div style={{background:"#0d1117",padding:"12px 20px",borderBottom:"1px solid #1e2d3d"}}>
            <div style={{maxWidth:1200,margin:"0 auto",display:"flex",flexWrap:"wrap",gap:10,alignItems:"center"}}>
              <input placeholder="🔍 Search sessions, speakers, topics, keywords…" value={searchQuery} onChange={e=>setSearchQuery(e.target.value)}
                style={{background:"#161f2e",border:"1px solid #1e3a5f",borderRadius:6,color:"#e2e8f0",padding:"7px 12px",fontSize:13,flex:"1 1 220px",minWidth:180,outline:"none"}}/>
              <button onClick={()=>setShowOnlyHighlight(!showOnlyHighlight)}
                style={{padding:"7px 14px",borderRadius:6,border:showOnlyHighlight?"1px solid #a78bfa":"1px solid #334155",background:showOnlyHighlight?"#2d1b4e":"#161f2e",color:showOnlyHighlight?"#c084fc":"#64748b",cursor:"pointer",fontSize:12,fontWeight:600,whiteSpace:"nowrap"}}>
                ⭐ HiTSeq / iRNA / BOKR / BOSC
              </button>
              {selectedTracks.size>0&&<button onClick={()=>setSelectedTracks(new Set())} style={{padding:"7px 12px",borderRadius:6,border:"1px solid #334155",background:"#161f2e",color:"#94a3b8",cursor:"pointer",fontSize:12}}>Clear ({selectedTracks.size})</button>}
              <div style={{display:"flex",flexWrap:"wrap",gap:5}}>
                {["HiTSeq","iRNA","BOKR","BOSC","ICBO","Keynote","MLCSB","CAMDA"].map(t=>{const c=getColor(t);const active=selectedTracks.has(t);return(
                  <button key={t} onClick={()=>toggleTrack(t)} style={{padding:"4px 10px",borderRadius:4,border:`1px solid ${active?c.border:"#334155"}`,background:active?c.bg:"transparent",color:active?c.text:"#64748b",cursor:"pointer",fontSize:11,fontWeight:600}}>{t}</button>);
                })}
              </div>
            </div>
          </div>

          {/* Track info modal */}
          {infoTrack&&TRACK_META[infoTrack]&&(
            <div onClick={()=>setInfoTrack(null)} style={{position:"fixed",inset:0,background:"#000a",zIndex:50,display:"flex",alignItems:"center",justifyContent:"center",padding:20}}>
              <div onClick={e=>e.stopPropagation()} style={{background:"#0f172a",border:`1px solid ${getColor(infoTrack).border}`,borderRadius:12,padding:24,maxWidth:500,width:"100%",maxHeight:"80vh",overflowY:"auto"}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:12}}>
                  <div>
                    <span style={{fontSize:10,padding:"2px 7px",borderRadius:3,border:`1px solid ${getColor(infoTrack).border}`,color:getColor(infoTrack).text,background:getColor(infoTrack).bg,fontWeight:700,display:"inline-block",marginBottom:8}}>
                      {infoTrack}{TRACK_META[infoTrack]?.closed&&<span style={{marginLeft:6,color:"#f87171"}}>● Closed</span>}
                    </span>
                    <div style={{fontWeight:700,fontSize:15,color:"#f1f5f9"}}>{TRACK_META[infoTrack]?.full}</div>
                  </div>
                  <button onClick={()=>setInfoTrack(null)} style={{background:"none",border:"none",color:"#64748b",cursor:"pointer",fontSize:18,padding:0,marginLeft:12}}>✕</button>
                </div>
                <p style={{fontSize:13,color:"#94a3b8",lineHeight:1.6,margin:"0 0 12px"}}>{TRACK_META[infoTrack]?.desc}</p>
                {TRACK_META[infoTrack]?.keywords&&<div style={{display:"flex",flexWrap:"wrap",gap:5,marginBottom:12}}>{TRACK_META[infoTrack].keywords.map(k=><span key={k} style={{fontSize:10,padding:"2px 7px",borderRadius:3,background:"#1e2d3d",color:"#64748b",border:"1px solid #334155"}}>{k}</span>)}</div>}
                {TRACK_META[infoTrack]?.url&&<a href={TRACK_META[infoTrack].url} target="_blank" rel="noopener noreferrer" style={{fontSize:12,color:"#38bdf8",textDecoration:"none"}}>Visit track website ↗</a>}
              </div>
            </div>
          )}

          {/* Sessions */}
          <div style={{maxWidth:1200,margin:"0 auto",padding:"16px 20px 40px"}}>
            <div style={{fontSize:12,color:"#475569",marginBottom:12}}>
              {filteredSessions.length} sessions · {currentDay?.label}, {currentDay?.date}
              <span style={{marginLeft:8,color:"#334155"}}>· Click track badge for info · Click session title to expand</span>
            </div>
            <div style={{display:"flex",flexDirection:"column",gap:7}}>
              {filteredSessions.map((session,i)=>{
                const c=getColor(session.track);
                const isExpanded=expandedSession===i;
                const isBreak=session.type==="break";
                const isKeynote=session.type==="keynote";
                const hasSpeakers=(session.speakers||[]).length>0;
                const hasDetails=(session.details||[]).length>0;
                const isClickable=hasSpeakers||hasDetails;
                const meta=TRACK_META[session.track];
                return(
                  <div key={i} style={{background:isBreak?"#0d1117":c.bg,border:`1px solid ${isBreak?"#1e2d3d":isKeynote?c.border:c.border+"55"}`,borderLeft:`3px solid ${c.border}`,borderRadius:8,padding:isBreak?"8px 14px":"12px 16px",opacity:isBreak?0.55:1,boxShadow:isKeynote?`0 0 20px ${c.border}22`:"none"}}>
                    <div style={{display:"flex",flexWrap:"wrap",gap:8,alignItems:"flex-start"}}>
                      <div style={{minWidth:90,fontSize:12,color:"#94a3b8",fontVariantNumeric:"tabular-nums",paddingTop:2}}>{session.time}</div>
                      <span onClick={()=>!isBreak&&meta&&setInfoTrack(session.track)}
                        style={{fontSize:10,fontWeight:700,letterSpacing:0.5,padding:"2px 7px",borderRadius:3,border:`1px solid ${c.border}88`,color:c.text,background:c.bg,whiteSpace:"nowrap",flexShrink:0,cursor:(meta&&!isBreak)?"help":"default",textDecoration:(meta&&!isBreak)?"underline dotted":"none"}}>
                        {session.track}{meta?.closed&&<span style={{marginLeft:4,color:"#f87171",fontSize:8}}>●</span>}
                      </span>
                      <div style={{flex:1,minWidth:0}}>
                        <div onClick={()=>isClickable&&setExpandedSession(isExpanded?null:i)}
                          style={{fontSize:isBreak?13:14,fontWeight:isKeynote?700:isBreak?400:600,color:isBreak?"#64748b":"#f1f5f9",lineHeight:1.4,cursor:isClickable?"pointer":"default"}}>
                          {session.title}{isClickable&&<span style={{marginLeft:6,fontSize:10,color:"#475569"}}>{isExpanded?"▲":"▼"}</span>}
                        </div>
                        <div style={{fontSize:11,color:"#475569",marginTop:2}}>📍 {session.room}</div>
                      </div>
                      {!isExpanded&&hasSpeakers&&(
                        <div style={{fontSize:11,color:c.text,opacity:0.8,alignSelf:"center",whiteSpace:"nowrap"}}>
                          {session.speakers[0].name}{session.speakers.length>1?` +${session.speakers.length-1}`:""}
                        </div>
                      )}
                    </div>
                    {isExpanded&&(
                      <div style={{marginTop:12,paddingTop:12,borderTop:`1px solid ${c.border}33`}}>
                        {(session.speakers||[]).map((sp,si)=>(
                          <div key={si} style={{marginBottom:si<session.speakers.length-1?12:0,padding:"10px 12px",background:"#0a0f1e",borderRadius:6,border:`1px solid ${c.border}44`}}>
                            <div style={{display:"flex",flexWrap:"wrap",gap:6,marginBottom:6}}>
                              {sp.role&&<span style={{fontSize:9,padding:"1px 6px",borderRadius:3,border:`1px solid ${c.border}`,color:c.text,fontWeight:700}}>{sp.role}</span>}
                              {sp.award&&<span style={{fontSize:9,padding:"1px 6px",borderRadius:3,border:"1px solid #e0c46c",color:"#e0c46c",fontWeight:700}}>🏆 {sp.award}</span>}
                            </div>
                            <div style={{fontWeight:700,color:"#f1f5f9",fontSize:14}}>{sp.name}</div>
                            {sp.affiliation&&<div style={{fontSize:12,color:"#64748b",marginTop:2}}>{sp.affiliation}</div>}
                            {sp.talk&&<div style={{fontSize:13,color:c.text,marginTop:8,fontStyle:"italic",lineHeight:1.5}}>"{sp.talk}"</div>}
                          </div>
                        ))}
                        {(session.details||[]).length>0&&(
                          <ul style={{margin:"8px 0 0",padding:0,listStyle:"none"}}>
                            {session.details.map((d,di)=>(
                              <li key={di} style={{fontSize:12,color:"#94a3b8",padding:"4px 0",borderBottom:di<session.details.length-1?"1px solid #1e2d3d":"none"}}>
                                <span style={{color:c.text,marginRight:6}}>›</span>{d}
                              </li>
                            ))}
                          </ul>
                        )}
                      </div>
                    )}
                  </div>
                );
              })}
              {filteredSessions.length===0&&(
                <div style={{textAlign:"center",padding:"60px 20px",color:"#475569"}}>
                  <div style={{fontSize:32,marginBottom:12}}>🔬</div>
                  <div style={{fontSize:16,fontWeight:600}}>No sessions match your filters</div>
                  <div style={{fontSize:13,marginTop:6}}>Try clearing filters or adjusting your search</div>
                </div>
              )}
            </div>

            {/* Footer */}
            <div style={{marginTop:32,padding:16,background:"#0d1117",borderRadius:8,border:"1px solid #1e2d3d"}}>
              <div style={{fontSize:11,color:"#475569",marginBottom:8,fontWeight:600,textTransform:"uppercase",letterSpacing:1}}>Data Sources</div>
              <div style={{display:"flex",flexWrap:"wrap",gap:8}}>
                {[
                  {label:"Abridged Agenda (PDF)",url:"https://www.iscb.org/documents/programmes/programme.AbridgedAgenda.ISMB.2026.pdf"},
                  {label:"Distinguished Keynotes",url:"https://www.iscb.org/ismb2026/whats-happening/distinguished-keynotes"},
                  {label:"Track Details",url:"https://www.iscb.org/ismb2026/whats-happening/track-details"},
                  {label:"HiTSeq Schedule",url:"https://www.hitseq.org/schedule.html"},
                  {label:"iRNA COSI",url:"https://irna.iscb.org/"},
                  {label:"BOSC 2026 Schedule",url:"https://www.open-bio.org/events/bosc-2026/bosc-2026-schedule/"},
                  {label:"BOKR 2026",url:"https://sites.google.com/site/bioontologies/2026-meeting"},
                  {label:"ICBO 2026 Agenda",url:"https://icbo-conference.github.io/icbo2026/agenda/"},
                  {label:"CAMDA 2026",url:"http://camda.info/"},
                  {label:"MICROBIOME COSI",url:"https://www.microbiome-cosi.org/ismb-2026/"},
                ].map(s=>(
                  <a key={s.url} href={s.url} target="_blank" rel="noopener noreferrer"
                    style={{fontSize:11,color:"#38bdf8",textDecoration:"none",padding:"3px 8px",border:"1px solid #1e3a5f",borderRadius:4}}>{s.label} ↗</a>
                ))}
              </div>
              <div style={{fontSize:10,color:"#334155",marginTop:8}}>
                Last updated: July 13, 2026 · ● = closed track · HiTSeq & ICBO have full talk-level schedules; BOSC talks in linked Google Sheet; iRNA keynote speakers confirmed; most other COSI talk-level schedules load via ISCB's JS platform (not crawlable) — check individual COSI sites for details.
              </div>
            </div>
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
