<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0a0f1e;color:#e2e8f0;font-family:'Inter','Segoe UI',sans-serif;min-height:100vh}
a{color:#38bdf8;text-decoration:none}
a:hover{text-decoration:underline}
button{cursor:pointer;font-family:inherit}
.header{background:linear-gradient(135deg,#0f172a 0%,#1e1b4b 50%,#0f172a 100%);border-bottom:1px solid #1e3a5f;padding:20px 20px 14px}
.header-inner{max-width:1200px;margin:0 auto}
.header-sub{display:flex;align-items:center;gap:10px;margin-bottom:4px}
.dot{width:8px;height:8px;border-radius:50%;background:#38bdf8;box-shadow:0 0 8px #38bdf8}
.conf-label{font-size:11px;letter-spacing:3px;color:#64748b;text-transform:uppercase;font-weight:600}
h1{font-size:clamp(22px,5vw,38px);font-weight:800;color:#f8fafc}
h1 span{color:#38bdf8}
.header-meta{color:#64748b;font-size:13px;margin-top:4px}
.stats{display:flex;gap:12px;margin-top:10px;flex-wrap:wrap}
.stat{font-size:11px;color:#94a3b8;background:#0f172a;border:1px solid #1e3a5f;padding:3px 10px;border-radius:4px}
.day-tabs{background:#0d1117;border-bottom:1px solid #1e2d3d;overflow-x:auto;display:flex;-webkit-overflow-scrolling:touch}
.day-tab{padding:12px 18px;background:transparent;border:none;border-bottom:2px solid transparent;color:#64748b;font-size:13px;font-weight:400;white-space:nowrap;transition:all 0.15s;flex-shrink:0;cursor:pointer}
.day-tab:hover{color:#94a3b8;background:#111827}
.day-tab.active{background:#1e3a5f;border-bottom-color:#38bdf8;color:#38bdf8;font-weight:700}
.day-tab-label{font-size:10px;opacity:0.7;margin-bottom:1px}
.controls{background:#0d1117;padding:10px 16px;border-bottom:1px solid #1e2d3d}
.controls-inner{max-width:1200px;margin:0 auto;display:flex;flex-wrap:wrap;gap:8px;align-items:center}
.search-input{background:#161f2e;border:1px solid #1e3a5f;border-radius:6px;color:#e2e8f0;padding:7px 12px;font-size:13px;flex:1 1 200px;min-width:150px;outline:none;font-family:inherit}
.search-input:focus{border-color:#38bdf8}
.search-input::placeholder{color:#475569}
.quick-filters{display:flex;flex-wrap:wrap;gap:5px;margin-top:4px;width:100%}
.qf-btn{padding:4px 10px;border-radius:4px;border:1px solid #334155;background:transparent;color:#64748b;font-size:11px;font-weight:600;transition:all 0.15s;cursor:pointer}
.qf-btn:hover{border-color:#475569;color:#94a3b8}
.btn-clear{padding:5px 10px;border-radius:5px;border:1px solid #334155;background:#161f2e;color:#94a3b8;font-size:11px;cursor:pointer}
.sessions-wrap{max-width:1200px;margin:0 auto;padding:12px 16px 40px}
.day-info{font-size:11px;color:#475569;margin-bottom:10px;padding:6px 0;border-bottom:1px solid #1e2d3d}
.sessions-list{display:flex;flex-direction:column;gap:6px}
.session{border-radius:7px;padding:10px 14px;border:1px solid #1e2d3d;border-left-width:3px;transition:box-shadow 0.15s}
.session.clickable{cursor:pointer}
.session.clickable:hover{box-shadow:0 0 0 1px rgba(255,255,255,0.08)}
.session-row{display:flex;flex-wrap:wrap;gap:8px;align-items:flex-start}
.session-time{min-width:90px;font-size:11px;color:#94a3b8;padding-top:2px;flex-shrink:0;font-variant-numeric:tabular-nums;font-family:monospace}
.session-track-badge{font-size:10px;font-weight:700;padding:2px 7px;border-radius:3px;white-space:nowrap;flex-shrink:0;border:1px solid;opacity:0.9}
.session-body{flex:1;min-width:0}
.session-title{font-size:13px;font-weight:600;color:#f1f5f9;line-height:1.4}
.session-title.keynote-title{font-weight:800;font-size:14px;color:#fff}
.session-room{font-size:11px;color:#475569;margin-top:3px}
.session-presenter{font-size:12px;color:#64748b;margin-top:2px}
.award-badge{display:inline-block;font-size:9px;background:#2a1e00;border:1px solid #e0c46c;color:#e0c46c;padding:1px 6px;border-radius:3px;margin-left:6px;font-weight:700;vertical-align:middle}
.keynote-glow{box-shadow:0 0 18px rgba(224,196,108,0.12)}
.detail-box{margin-top:10px;padding-top:10px;border-top:1px solid rgba(255,255,255,0.07);font-size:12px;color:#94a3b8;line-height:1.6}
.empty{text-align:center;padding:60px 20px;color:#475569}
.empty-icon{font-size:32px;margin-bottom:12px}
.footer{margin-top:28px;padding:14px;background:#0d1117;border-radius:8px;border:1px solid #1e2d3d}
.footer-label{font-size:10px;color:#475569;margin-bottom:8px;font-weight:600;text-transform:uppercase;letter-spacing:1px}
.footer-links{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:8px}
.footer-link{font-size:11px;padding:3px 8px;border:1px solid #1e3a5f;border-radius:4px;color:#38bdf8}
.footer-note{font-size:10px;color:#334155;line-height:1.5}
</style>
</head>

function gc(t) {

}

var state = {
  day: "mon",
  search: "",
  selectedTracks: [],
  expandedIdx: null,
};

function setState(p) {
  Object.keys(p).forEach(function(k){ state[k] = p[k]; });
  render();
}

function el(tag, attrs) {
  var e = document.createElement(tag);
  var children = Array.prototype.slice.call(arguments, 2);
  if (attrs) {
    Object.keys(attrs).forEach(function(k) {
      var v = attrs[k];
      if (k === "className") { e.className = v; }
      else if (k.indexOf("on") === 0) { e.addEventListener(k.slice(2).toLowerCase(), v); }
      else if (k === "style" && typeof v === "object") { Object.assign(e.style, v); }
      else { e.setAttribute(k, v); }
    });
  }
  children.forEach(function(c) {
    if (c == null || c === false) return;
    e.appendChild(typeof c === "string" ? document.createTextNode(c) : c);
  });
  return e;
}

function render() {
  var app = document.getElementById("app");
  while (app.firstChild) app.removeChild(app.firstChild);

  var daySessions = DAY_SESSIONS[state.day] || [];
  var sessions = daySessions.filter(function(s) {
    if (state.selectedTracks.length > 0 && state.selectedTracks.indexOf(s.track) < 0) return false;
    if (state.search) {
      var q = state.search.toLowerCase();
      var hay = [s.title, s.track, s.room, s.presenter].join(" ").toLowerCase();
      if (hay.indexOf(q) < 0) return false;
    }
    return true;
  });

  var totalBlocks = 0;
  Object.keys(DAY_SESSIONS).forEach(function(k){ totalBlocks += DAY_SESSIONS[k].length; });

  // Header
  var hdr = el("div", {className:"header"},
    el("div", {className:"header-inner"},
      el("div", {className:"header-sub"}, el("div",{className:"dot"}), el("span",{className:"conf-label"},"34th Annual Conference")),
      el("h1", {}, "ISMB ", el("span",{},"2026")),
      el("p", {className:"header-meta"}, "Washington Hilton, Washington DC  ·  July 12–16, 2026  ·  Hybrid In-Person & Virtual"),
      el("div", {className:"stats"},
        el("span",{className:"stat"}, totalBlocks + " session blocks"),
        el("span",{className:"stat"}, "5 conference days"),
        el("span",{className:"stat"}, Object.keys(TRACKS).length + " tracks / COSIs"),
        el("span",{className:"stat"}, "Real data — ISCB schedule portal")
      )
    )
  );

  // Day tabs
  var tabs = el("div", {className:"day-tabs"});
  DAYS.forEach(function(d) {
    var btn = el("div", {className:"day-tab" + (d.id === state.day ? " active" : "")},
      el("div", {className:"day-tab-label"}, d.label),
      d.date.split(" ")[1]
    );
    btn.onclick = (function(id){ return function(){ setState({day:id, expandedIdx:null}); }; })(d.id);
    tabs.appendChild(btn);
  });

  // Controls
  var si = document.createElement("input");
  si.className = "search-input";
  si.placeholder = "Search sessions, speakers, topics…";
  si.value = state.search;
  si.type = "text";
  si.oninput = function(e){ setState({search:e.target.value, expandedIdx:null}); };

  var tracksToShow = ["HiTSeq","iRNA","BOKR","BOSC","MLCSB","3DSIG","RegSys","CAMDA","VarI","Function","EvolCompGen","NetBio","DREAM","TransMed","CompMS","CSI","MICROBIOME","BioVis","SysMod","GenCompBio"];
  var qfDiv = el("div", {className:"quick-filters"});
  tracksToShow.forEach(function(t) {
    var info = gc(t);
    var active = state.selectedTracks.indexOf(t) >= 0;
    var b = el("button", {className:"qf-btn"}, t);
    if (active) {
      b.style.borderColor = info.c;
      b.style.background = info.bg;
      b.style.color = info.c;
    }
    b.onclick = (function(track){ return function() {
      var n = state.selectedTracks.slice();
      var idx = n.indexOf(track);
      if (idx >= 0) n.splice(idx,1); else n.push(track);
      setState({selectedTracks:n, expandedIdx:null});
    }; })(t);
    qfDiv.appendChild(b);
  });

  var ctrlInner = el("div", {className:"controls-inner"}, si);
  if (state.selectedTracks.length > 0) {
    var clr = el("button", {className:"btn-clear"}, "✕ Clear (" + state.selectedTracks.length + ")");
    clr.onclick = function(){ setState({selectedTracks:[], expandedIdx:null}); };
    ctrlInner.appendChild(clr);
  }
  ctrlInner.appendChild(qfDiv);
  var ctrl = el("div", {className:"controls"}, ctrlInner);

  // Day info bar
  var dayCur = DAYS.filter(function(d){ return d.id === state.day; })[0];
  var infoBar = el("div", {className:"day-info"},
    sessions.length + " sessions shown  ·  " + dayCur.label + ", " + dayCur.date +
    (state.search || state.selectedTracks.length > 0 ? "  ·  (filtered)" : "  ·  Click any session to expand")
  );

  // Session cards
  var listEl = el("div", {className:"sessions-list"});
  if (sessions.length === 0) {
    listEl = el("div", {className:"empty"},
      el("div", {className:"empty-icon"}, "🔬"),
      el("div", {}, "No sessions match your filters")
    );
  } else {
    sessions.forEach(function(s, i) {
      var info = gc(s.track);
      var isExpanded = state.expandedIdx === i;
      var isKeynote = s.keynote;

      var badge = el("span", {className:"session-track-badge"}, s.track);
      badge.style.color = info.c;
      badge.style.background = info.bg;
      badge.style.borderColor = info.c + "88";

      var titleEl = el("div", {className:"session-title" + (isKeynote ? " keynote-title" : "")}, s.title);
      if (s.award) {
        titleEl.appendChild(el("span", {className:"award-badge"}, "★ " + s.award));
      }

      var body = el("div", {className:"session-body"},
        titleEl,
        el("div", {className:"session-room"}, "📍 " + s.room)
      );
      if (s.presenter) {
        body.appendChild(el("div", {className:"session-presenter"}, "👤 " + s.presenter));
      }

      var row = el("div", {className:"session-row"},
        el("div", {className:"session-time"}, s.time),
        badge,
        body
      );

      var div = el("div", {className:"session" + (s.presenter ? " clickable" : "")});
      div.style.background = info.bg;
      div.style.borderLeftColor = info.c;
      div.style.borderColor = info.c + "22";
      div.style.borderLeftColor = info.c;
      if (isKeynote) { div.className += " keynote-glow"; }

      if (s.presenter) {
        div.onclick = (function(idx){ return function(){
          setState({expandedIdx: state.expandedIdx === idx ? null : idx});
        }; })(i);
      }
      div.appendChild(row);

      if (isExpanded) {
        var detail = el("div", {className:"detail-box"}, s.title);
        if (s.award) detail.appendChild(el("span", {}, "  ·  Award: " + s.award));
        div.appendChild(detail);
      }

      listEl.appendChild(div);
    });
  }

  // Footer
  var footerLinks = [
    ["ISCB Schedule Portal","https://transition.iscb.org/cms_addon/conferences/ismb2026/schedule/detailed"],
    ["Abridged Agenda PDF","https://www.iscb.org/documents/programmes/programme.AbridgedAgenda.ISMB.2026.pdf"],
    ["Distinguished Keynotes","https://www.iscb.org/ismb2026/whats-happening/distinguished-keynotes"],
    ["HiTSeq","https://www.hitseq.org/schedule.html"],
    ["iRNA","https://irna.iscb.org/"],
    ["BOSC 2026","https://www.open-bio.org/events/bosc-2026/"],
    ["BOKR","https://sites.google.com/site/bioontologies/2026-meeting"],
    ["ICBO 2026","https://icbo-conference.github.io/icbo2026/agenda/"],
    ["CAMDA","http://camda.info/"],
  ];
  var flinkDiv = el("div", {className:"footer-links"});
  footerLinks.forEach(function(pair) {
    flinkDiv.appendChild(el("a", {className:"footer-link", href:pair[1], target:"_blank", rel:"noopener noreferrer"}, pair[0] + " ↗"));
  });

  var footer = el("div", {className:"footer"},
    el("div", {className:"footer-label"}, "Data Sources"),
    flinkDiv,
    el("div", {className:"footer-note"}, "Updated July 13, 2026. Data from the ISCB transition schedule portal (official CSV export). Sessions are shown as day blocks for tracks with many talks. Expand cards to see full session details.")
  );

  var wrap = el("div", {className:"sessions-wrap"}, infoBar, listEl, footer);

  app.appendChild(hdr);
  app.appendChild(tabs);
  app.appendChild(ctrl);
  app.appendChild(wrap);
}

render();
</script>
</body>
</html>
